<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game of Strife — Gameplay Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../ui/phone-frame.css">
  <link rel="stylesheet" href="../ui/promo-theme.css">
  <style>
    /* HUD */
    .game-hud {
      background: #1A0033;
      border-bottom: 1px solid #330066;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .hud-player-box {
      flex: 1;
      text-align: center;
      padding: 6px 4px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .hud-player-box.hud-active {
      border-color: #FFFF00;
      box-shadow: 0 0 8px rgba(255,255,0,0.4);
    }

    .hud-player-name {
      font-size: 7px;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .hud-p1-box .hud-player-name { color: #A78BFA; text-shadow: 0 0 6px #A78BFA; }
    .hud-p2-box .hud-player-name { color: #FF006E; text-shadow: 0 0 6px #FF006E; }

    .hud-count {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .hud-count-label {
      font-size: 6px;
      color: #888;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-center {
      flex: 0 0 auto;
      text-align: center;
      min-width: 90px;
    }

    #hud-status {
      font-size: 7px;
      color: #FFFF00;
      text-shadow: 0 0 8px #FFFF00;
      letter-spacing: 1px;
    }

    /* Board area */
    .board-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      position: relative;
    }

    #gameCanvas {
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(167,139,250,0.2);
    }

    /* Overlay text (titles, messages) */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .overlay.visible { opacity: 1; }

    .overlay-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 22px;
      color: #A78BFA;
      text-shadow: 0 0 20px #A78BFA, 0 0 40px #A78BFA;
      text-align: center;
      line-height: 1.6;
      white-space: pre-line;
    }

    .overlay-subtitle {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #C4B5FD;
      margin-top: 14px;
      text-align: center;
      letter-spacing: 2px;
    }

    /* Result card */
    .result-card {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, #1A0033, rgba(26,0,51,0.95));
      border-top: 1px solid #330066;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .result-card.visible { transform: translateY(0); }

    .result-scores {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .result-score {
      flex: 1;
      text-align: center;
    }

    .result-score-label {
      font-size: 7px;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .result-score-value {
      font-size: 32px;
    }

    .p1-score .result-score-label { color: #A78BFA; }
    .p1-score .result-score-value { color: #A78BFA; text-shadow: 0 0 12px #A78BFA; }
    .p2-score .result-score-label { color: #FF006E; }
    .p2-score .result-score-value { color: #FF006E; text-shadow: 0 0 12px #FF006E; }

    .result-vs {
      font-size: 10px;
      color: #666;
    }

    .result-gen {
      font-size: 7px;
      color: #888;
      letter-spacing: 1px;
    }

    .result-winner-label {
      font-size: 10px;
      letter-spacing: 2px;
      padding: 6px 16px;
      border-radius: 4px;
      border: 1px solid currentColor;
    }

    /* Controls (outside phone, for recording setup) */
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 100;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .ctrl-btn:hover { background: rgba(255,255,255,0.2); }
    .ctrl-btn.primary { background: #A78BFA; border-color: #A78BFA; color: #000; }
    .ctrl-btn.primary:hover { background: #c4b5fd; }
  </style>
</head>
<body>
  <div class="scene-bg"></div>

  <!-- Broadcast title banner -->
  <div class="promo-top-banner">
    <span class="promo-logo">GAME OF STRIFE</span>
    <span class="promo-logo-sub">Conway's Game of Life — PvP</span>
  </div>

  <!-- Bottom rainbow strip -->
  <div class="promo-bottom-strip"></div>

  <!-- Outer retro overlay stage (outside phone) -->
  <div id="retro-overlay-stage"></div>

  <div class="phone-wrap" id="phoneWrap">
    <div class="phone-shell">
      <div class="phone-island"></div>
      <div class="phone-screen">
        <div class="phone-status-bar">
          <span>9:41</span>
          <span>●●●</span>
        </div>

        <div class="phone-content">
          <!-- HUD -->
          <div class="game-hud">
            <div class="hud-player-box hud-p1-box" id="hud-p1-box">
              <div class="hud-player-name">PLAYER 1</div>
              <div class="hud-count" id="hud-p1-count">--</div>
              <div class="hud-count-label" id="hud-p1-label">tokens</div>
            </div>
            <div class="hud-center">
              <div id="hud-status">READY</div>
            </div>
            <div class="hud-player-box hud-p2-box" id="hud-p2-box">
              <div class="hud-player-name">PLAYER 2</div>
              <div class="hud-count" id="hud-p2-count">--</div>
              <div class="hud-count-label" id="hud-p2-label">tokens</div>
            </div>
          </div>

          <!-- Board -->
          <div class="board-area">
            <canvas id="gameCanvas"></canvas>

            <!-- Overlay (titles, messages) -->
            <div class="overlay" id="overlay">
              <div class="overlay-title" id="overlayText"></div>
              <div class="overlay-subtitle" id="overlaySubtext"></div>
            </div>
          </div>

          <!-- Result card -->
          <div class="result-card" id="resultCard">
            <div class="result-winner-label" id="resultWinnerLabel">P1 WINS!</div>
            <div class="result-scores">
              <div class="result-score p1-score">
                <div class="result-score-label">PLAYER 1</div>
                <div class="result-score-value" id="result-p1-cells">--</div>
              </div>
              <div class="result-vs">VS</div>
              <div class="result-score p2-score">
                <div class="result-score-label">PLAYER 2</div>
                <div class="result-score-value" id="result-p2-cells">--</div>
              </div>
            </div>
            <div class="result-gen" id="result-gen">-- GENERATIONS</div>
          </div>
        </div>

        <div class="phone-home-bar"></div>
      </div>
    </div>
  </div>

  <!-- Recording controls (hide before recording) -->
  <div class="controls" id="controls">
    <button class="ctrl-btn primary" id="btnPlay" onclick="playScene()">▶ PLAY</button>
    <button class="ctrl-btn" onclick="resetScene()">↺ RESET</button>
    <button class="ctrl-btn" onclick="toggleControls()">HIDE</button>
  </div>

  <script src="../config/scene.js"></script>
  <script src="../engine/superpowers.js"></script>
  <script src="../scripts/retro-overlays.js"></script>
  <script src="../engine/colors.js"></script>
  <script src="../engine/conway.js"></script>
  <script src="../ui/board.js"></script>
  <script src="../ui/hud.js"></script>
  <script src="../scripts/runner.js"></script>
  <script>
    // ─── State ────────────────────────────────────────────────────────────────

    const cfg = SCENE_CONFIG
    const canvas = document.getElementById('gameCanvas')

    let board = makeEmptyBoard(cfg.settings.boardSize)
    let p1Remaining = cfg.settings.tokensPerPlayer
    let p2Remaining = cfg.settings.tokensPerPlayer
    let currentTurn = 'P1'
    let simFrames = []
    let cancelAnim = null
    let timeline = null

    // ─── Board helpers ────────────────────────────────────────────────────────

    function makeEmptyBoard(size) {
      return Array.from({ length: size }, () =>
        Array.from({ length: size }, () => makeCell())
      )
    }

    function resizeCanvas() {
      const boardArea = canvas.parentElement
      const maxW = boardArea.clientWidth - 24
      const maxH = boardArea.clientHeight - 24
      const dim = Math.min(maxW, maxH)
      canvas.width = dim
      canvas.height = dim
    }

    function scalePhone() {
      const wrap = document.getElementById('phoneWrap')
      const vw = window.innerWidth
      const vh = window.innerHeight - 80
      const scaleX = vw / 390
      const scaleY = vh / 844
      const scale = Math.min(scaleX, scaleY, 1)
      wrap.style.transform = `scale(${scale})`
    }

    window.addEventListener('resize', () => { scalePhone(); resizeCanvas(); renderBoard(canvas, board) })
    scalePhone()
    resizeCanvas()

    // ─── Overlay system ───────────────────────────────────────────────────────

    let overlayHideTimer = null

    function showOverlay(text, sub) {
      if (overlayHideTimer) { clearTimeout(overlayHideTimer); overlayHideTimer = null }
      document.getElementById('overlayText').textContent = text || ''
      document.getElementById('overlaySubtext').textContent = sub || ''
      document.getElementById('overlay').classList.add('visible')
    }

    function hideOverlay() {
      document.getElementById('overlay').classList.remove('visible')
    }

    // Fire a named moment — routes inner vs outer overlays
    function fireOverlayMoment(name) {
      // In-phone overlays (no position field, or position !== 'outer')
      const inner = (cfg.overlays || []).find(o => o.at === name && o.position !== 'outer')
      if (inner) {
        if (inner.text === null || inner.text === undefined) hideOverlay()
        else {
          showOverlay(inner.text, inner.sub)
          if (inner.duration > 0) overlayHideTimer = setTimeout(hideOverlay, inner.duration)
        }
      }
      // Outer retro overlays
      if (typeof window.fireRetroOverlay === 'function') window.fireRetroOverlay(name)
    }

    // ─── Scene action functions ───────────────────────────────────────────────

    function placeToken(player, row, col, spType) {
      spType = spType || 0
      const p = player === 'P1' ? 0 : 1
      board[row][col] = makeCell(p, spType)
      if (player === 'P1') p1Remaining--
      else p2Remaining--
      currentTurn = player === 'P1' ? 'P2' : 'P1'
      renderBoard(canvas, board)
      renderHUD({
        stage: 'placement', currentTurn,
        p1Tokens: p1Remaining, p2Tokens: p2Remaining,
        p1Cells: 0, p2Cells: 0, generation: 0, maxGenerations: cfg.settings.maxGenerations,
      })
    }

    function assignSuperpower(player, row, col, spType) {
      board[row][col].superpowerType = spType
      currentTurn = player === 'P1' ? 'P2' : 'P1'
      renderBoard(canvas, board)
      renderHUD({
        stage: 'sp_assignment', currentTurn,
        p1Tokens: p1Remaining, p2Tokens: p2Remaining,
        p1Cells: 0, p2Cells: 0, generation: 0, maxGenerations: cfg.settings.maxGenerations,
      })
    }

    function startSimulation() {
      fireOverlayMoment('simulation_start')

      const simSettings = {
        birthRules:          cfg.settings.conwayRules.birthRules,
        survivalRules:       cfg.settings.conwayRules.survivalRules,
        enableToroidalBoard: cfg.settings.enableToroidalBoard !== false,
        superpowerRules:     cfg.settings.superpowerRules
          ? { ...DEFAULT_SUPERPOWER_RULES, ...cfg.settings.superpowerRules }
          : DEFAULT_SUPERPOWER_RULES,
      }

      simFrames = runSimulation(board, simSettings, cfg.settings.maxGenerations)

      // For short_clip: slice to requested generation count
      const stop = cfg.stopAfterGeneration
      const frames = (stop != null && stop < simFrames.length - 1)
        ? simFrames.slice(0, stop + 1)
        : simFrames

      let gen = 0
      cancelAnim = animateSimulation(frames, cfg.settings.generationDelayMs, (frame, idx) => {
        gen = idx
        board = frame
        renderBoard(canvas, board)
        const counts = countCells(board)
        renderHUD({
          stage: 'simulation', currentTurn: null,
          p1Tokens: 0, p2Tokens: 0,
          p1Cells: counts.p1, p2Cells: counts.p2,
          generation: gen, maxGenerations: frames.length - 1,
        })
      }, () => {
        if (cfg.type === 'still_image') return  // no result card for stills
        if (cfg.showResult !== false) showResult(gen)
        fireOverlayMoment('result')
      })
    }

    function showResult(generations) {
      const counts = countCells(board)
      const winner = counts.p1 > counts.p2 ? 'P1' : counts.p2 > counts.p1 ? 'P2' : 'DRAW'
      const color = winner === 'P1' ? '#A78BFA' : winner === 'P2' ? '#FF006E' : '#888'

      const label = document.getElementById('resultWinnerLabel')
      label.textContent = winner === 'DRAW' ? 'DRAW!' : `${winner} WINS!`
      label.style.color = color
      label.style.borderColor = color

      document.getElementById('result-p1-cells').textContent = counts.p1
      document.getElementById('result-p2-cells').textContent = counts.p2
      document.getElementById('result-gen').textContent = `${generations} GENERATIONS`
      document.getElementById('resultCard').classList.add('visible')

      renderHUD({
        stage: 'finished', currentTurn: null, p1Tokens: 0, p2Tokens: 0,
        p1Cells: counts.p1, p2Cells: counts.p2,
        generation: generations, maxGenerations: simFrames.length,
      })
    }

    // ─── Timeline builder ─────────────────────────────────────────────────────

    function buildTimelineFromConfig() {
      const steps = []
      const intro = cfg.introDelayMs ?? 500
      const p1Delay = cfg.placementDelayMs ?? 600
      const p2Delay = cfg.p2PlacementDelayMs ?? 400
      const spDelay = cfg.spAssignDelayMs ?? 500

      // Absolute-ms overlays (named-moment overlays are fired inline, not via timeline)
      for (const entry of (cfg.overlays || [])) {
        if (typeof entry.at === 'number') {
          if (entry.position === 'outer') {
            // Route to retro system
            steps.push({ at: entry.at, fn: () => { if (typeof window.fireRetroOverlayEntry === 'function') window.fireRetroOverlayEntry(entry) } })
          } else {
            steps.push({ at: entry.at, fn: entry.text === null ? hideOverlay : showOverlay,
              args: entry.text === null ? [] : [entry.text, entry.sub] })
            if (entry.text !== null && entry.duration > 0) {
              steps.push({ at: entry.at + entry.duration, fn: hideOverlay })
            }
          }
        }
      }

      // Initial HUD state
      steps.push({ at: intro - 10, fn: renderHUD, args: [{
        stage: 'placement', currentTurn: 'P1',
        p1Tokens: cfg.settings.tokensPerPlayer, p2Tokens: cfg.settings.tokensPerPlayer,
        p1Cells: 0, p2Cells: 0, generation: 0, maxGenerations: cfg.settings.maxGenerations,
      }]})

      // Placement moves
      let t = intro
      for (const move of (cfg.placement || [])) {
        const [player, row, col, spType] = move
        const delay = player === 'P1' ? p1Delay : p2Delay
        steps.push({ at: t, fn: placeToken, args: [player, row, col, spType || 0] })
        t += delay
      }

      // Named overlay: placement_done
      steps.push({ at: t, fn: fireOverlayMoment, args: ['placement_done'] })
      t += 200

      // SP assignment phase (manual mode only)
      if (cfg.settings.superpowerPlacementMode === 'manual' && cfg.spAssignments && cfg.spAssignments.length > 0) {
        // Fire sp_assignment HUD state
        steps.push({ at: t, fn: renderHUD, args: [{
          stage: 'sp_assignment', currentTurn: cfg.spAssignments[0][0],
          p1Tokens: cfg.settings.tokensPerPlayer, p2Tokens: cfg.settings.tokensPerPlayer,
          p1Cells: 0, p2Cells: 0, generation: 0, maxGenerations: cfg.settings.maxGenerations,
        }]})
        t += 200

        for (const [player, row, col, spType] of cfg.spAssignments) {
          steps.push({ at: t, fn: assignSuperpower, args: [player, row, col, spType] })
          t += spDelay
        }

        steps.push({ at: t, fn: fireOverlayMoment, args: ['sp_assignment_done'] })
        t += 300
      }

      // Start simulation
      steps.push({ at: t + 400, fn: startSimulation })

      return steps
    }

    // ─── Still image renderer (no animation) ─────────────────────────────────

    function renderStillImage() {
      if (cfg.boardState) {
        board = cfg.boardState
      } else {
        // Run placement silently
        for (const move of (cfg.placement || [])) {
          const [player, row, col, spType] = move
          const p = player === 'P1' ? 0 : 1
          board[row][col] = makeCell(p, spType || 0)
        }
        // Apply SP assignments silently
        if (cfg.settings.superpowerPlacementMode === 'manual') {
          for (const [, row, col, spType] of (cfg.spAssignments || [])) {
            board[row][col].superpowerType = spType
          }
        }
        // Fast-simulate to requested generation or stability
        const simSettings = {
          birthRules:          cfg.settings.conwayRules.birthRules,
          survivalRules:       cfg.settings.conwayRules.survivalRules,
          enableToroidalBoard: cfg.settings.enableToroidalBoard !== false,
          superpowerRules:     cfg.settings.superpowerRules
            ? { ...DEFAULT_SUPERPOWER_RULES, ...cfg.settings.superpowerRules }
            : DEFAULT_SUPERPOWER_RULES,
        }
        const frames = runSimulation(board, simSettings, cfg.settings.maxGenerations)
        const stop = cfg.stopAfterGeneration
        const finalFrame = (stop != null && stop < frames.length - 1)
          ? frames[stop]
          : frames[frames.length - 1]
        board = finalFrame
      }

      renderBoard(canvas, board)
      const counts = countCells(board)
      renderHUD({
        stage: 'finished', currentTurn: null, p1Tokens: 0, p2Tokens: 0,
        p1Cells: counts.p1, p2Cells: counts.p2,
        generation: cfg.stopAfterGeneration ?? 0,
        maxGenerations: cfg.settings.maxGenerations,
      })
      if (cfg.showResult !== false) {
        showResult(cfg.stopAfterGeneration ?? 0)
      }
    }

    // ─── Controls ─────────────────────────────────────────────────────────────

    function playScene() {
      document.getElementById('btnPlay').disabled = true

      if (cfg.type === 'still_image') {
        renderStillImage()
        return
      }

      if (!timeline) timeline = runner(buildTimelineFromConfig())
      timeline.play()
    }

    function resetScene() {
      if (cancelAnim) { cancelAnim(); cancelAnim = null }
      if (overlayHideTimer) { clearTimeout(overlayHideTimer); overlayHideTimer = null }
      if (timeline) { timeline.reset(); timeline = null }

      board = makeEmptyBoard(cfg.settings.boardSize)
      p1Remaining = cfg.settings.tokensPerPlayer
      p2Remaining = cfg.settings.tokensPerPlayer
      currentTurn = 'P1'
      simFrames = []

      document.getElementById('resultCard').classList.remove('visible')
      hideOverlay()
      document.getElementById('btnPlay').disabled = false
      resizeCanvas()
      renderBoard(canvas, board)
      renderHUD({
        stage: 'placement', currentTurn: 'P1',
        p1Tokens: cfg.settings.tokensPerPlayer, p2Tokens: cfg.settings.tokensPerPlayer,
        p1Cells: 0, p2Cells: 0, generation: 0, maxGenerations: cfg.settings.maxGenerations,
      })
    }

    function toggleControls() {
      const c = document.getElementById('controls')
      c.style.display = c.style.display === 'none' ? 'flex' : 'none'
    }

    // ─── Init ──────────────────────────────────────────────────────────────────
    resizeCanvas()
    renderBoard(canvas, board)
    renderHUD({
      stage: 'placement', currentTurn: 'P1',
      p1Tokens: cfg.settings.tokensPerPlayer, p2Tokens: cfg.settings.tokensPerPlayer,
      p1Cells: 0, p2Cells: 0, generation: 0, maxGenerations: cfg.settings.maxGenerations,
    })
  </script>
</body>
</html>
